<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>
<body>

    <header>
        <h1>My Web Store</h1>
        <nav>
            <ul>
                <li><a href="Home.html">Home</a></li>
                <li><a href="ProductList.html">Products</a></li>
                <li><a href="AboutUs.html">About Us</a></li>
                <li><strong>Contact Us</strong></li>
            </ul>
        </nav>
    </header>
    <hr>

    <main>
        <section>
            <h2>Get In Touch</h2>
            <p>Have questions, issues, or feedback? Message mk b mk: </p>

            <form action="#" method="post">
                <fieldset>
                    <legend>Contact Form</legend>
                    
                    <p>
                        <label for="name">Full Name:</label><br>
                        <input type="text" id="name" name="name" minlength="3" maxlength="50" required>
                    </p>
                    
                    <p>
                        <label for="email">Email Address:</label><br>
                        <input type="email" id="email" name="email" required>
                    </p>
                    
                    <p>
                        <label for="subject">Topic:</label><br>
                        <select id="subject" name="subject">
                            <option value="general">General Inquiry</option>
                            <option value="support">Technical Support</option>
                            <option value="sales">Sales/Orders</option>
                        </select>
                    </p>
                    
                    <p>
                        <label for="message">Message:</label><br>
                        <textarea id="message" name="message" rows="6" cols="40" required></textarea>
                    </p>
                    
                    <p>
                        <button type="submit">Send Message</button>
                        <button type="reset">Clear Form</button>
                    </p>
                </fieldset>
            </form>
        </section>
    </main>
    <hr>

    <footer>
        <p>&copy; 2026 My Web Store. All rights reserved.</p>
    </footer>

</body>
</html>
